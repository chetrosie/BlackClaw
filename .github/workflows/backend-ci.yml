name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - data/**
      - package.json
      - package-lock.json
      - Dockerfile
      - .dockerignore
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - server/**
      - data/**
      - package.json
      - package-lock.json
      - Dockerfile
      - .dockerignore
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate server syntax
        run: |
          find server -name '*.js' -print0 | xargs -0 -n1 node --check

  docker-build:
    runs-on: ubuntu-latest
    needs: node-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t blackclaw-api:ci .
