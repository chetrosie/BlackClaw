name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - data/**
      - package.json
      - package-lock.json
      - Dockerfile
      - .dockerignore
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - server/**
      - data/**
      - package.json
      - package-lock.json
      - Dockerfile
      - .dockerignore
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate server syntax
        run: |
          node --check server/app.js
          node --check server/index.js
          node --check server/config.js
          node --check server/lib/db.js
          node --check server/providers/mockProvider.js
          node --check server/services/provisioner.js

  docker-build:
    runs-on: ubuntu-latest
    needs: node-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t blackclaw-api:ci .
